name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - run: chmod +x gradlew
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Run Android Lint
        run: ./gradlew lint --no-daemon
      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          if-no-files-found: warn
          retention-days: 14
      - name: Fail if Lint errors found
        run: |
          if grep -q 'severity="Error"' app/build/reports/lint-results*.xml 2>/dev/null; then
            echo "Lint errors found"
            grep -o 'message="[^"]*"' app/build/reports/lint-results*.xml | sed 's/message="//;s/"//' | sort -u | head -20
            exit 1
          else
            echo "No Lint errors"
          fi

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - run: chmod +x gradlew
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Build Debug APK (log to file)
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle-build.log
          echo "Exit code: $?"
      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          if-no-files-found: warn
          retention-days: 7
      - name: Find and upload APK
        run: |
          echo "=== All APKs found ==="
          find . -name "*.apk" 2>/dev/null || echo "NONE"
          echo "=== app/build/ exists? ==="
          ls app/build/ 2>/dev/null || echo "NO"
          # Copy APK to a predictable path
          mkdir -p /tmp/apk-out
          find . -name "*.apk" -exec cp {} /tmp/apk-out/ \;
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuoShield-debug-${{ github.run_number }}
          path: /tmp/apk-out/
          if-no-files-found: error
          retention-days: 30
      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
