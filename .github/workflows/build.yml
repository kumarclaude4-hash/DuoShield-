name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - run: chmod +x gradlew
      - name: Inject google-services.json (if secret is set)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "google-services.json written from secret"
          else
            echo "Using committed google-services.json"
          fi
      - run: ./gradlew lint --no-daemon
        continue-on-error: true
      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          if-no-files-found: warn
          retention-days: 14
      - name: Report Lint findings (informational)
        if: always()
        continue-on-error: true
        run: |
          if grep -q 'severity="Error"' app/build/reports/lint-results*.xml 2>/dev/null; then
            echo "Lint errors found (informational — build continues)"
            grep -o 'message="[^"]*"' app/build/reports/lint-results*.xml 2>/dev/null \
              | sed 's/message="//;s/"//' | sort -u | head -20 || true
          else
            echo "No Lint errors"
          fi

  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - run: chmod +x gradlew
      - name: Inject google-services.json (if secret is set)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "google-services.json written from secret"
          else
            echo "Using committed google-services.json"
          fi
      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle-build.log
      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          if-no-files-found: warn
          retention-days: 7
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuoShield-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Signed Release APK
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - run: chmod +x gradlew
      - name: Inject google-services.json (if secret is set)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi
      - name: Build Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}